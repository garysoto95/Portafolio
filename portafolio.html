<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio completo — Gary Soto</title>
<style>
/* ── ORBITRON ── */
@font-face { font-family:'Orbitron'; src:url('fonts/Orbitron-Regular.woff2') format('woff2'); font-weight:400; font-display:block; }
@font-face { font-family:'Orbitron'; src:url('fonts/Orbitron-Medium.woff2') format('woff2'); font-weight:500; font-display:block; }
@font-face { font-family:'Orbitron'; src:url('fonts/Orbitron-SemiBold.woff2') format('woff2'); font-weight:600; font-display:block; }
@font-face { font-family:'Orbitron'; src:url('fonts/Orbitron-Bold.woff2') format('woff2'); font-weight:700; font-display:block; }
@font-face { font-family:'Orbitron'; src:url('fonts/Orbitron-ExtraBold.woff2') format('woff2'); font-weight:800; font-display:block; }
@font-face { font-family:'Orbitron'; src:url('fonts/Orbitron-Black.woff2') format('woff2'); font-weight:900; font-display:block; }
/* ── SPACE GROTESK ── */
@font-face { font-family:'Space Grotesk'; src:url('fonts/SpaceGrotesk-Light.woff2') format('woff2'); font-weight:300; font-display:block; }
@font-face { font-family:'Space Grotesk'; src:url('fonts/SpaceGrotesk-Regular.woff2') format('woff2'); font-weight:400; font-display:block; }
@font-face { font-family:'Space Grotesk'; src:url('fonts/SpaceGrotesk-Medium.woff2') format('woff2'); font-weight:500; font-display:block; }
@font-face { font-family:'Space Grotesk'; src:url('fonts/SpaceGrotesk-SemiBold.woff2') format('woff2'); font-weight:600; font-display:block; }
@font-face { font-family:'Space Grotesk'; src:url('fonts/SpaceGrotesk-Bold.woff2') format('woff2'); font-weight:700; font-display:block; }
/* ── SYNE ── */
@font-face { font-family:'Syne'; src:url('fonts/Syne-Regular.woff2') format('woff2'); font-weight:400; font-display:block; }
@font-face { font-family:'Syne'; src:url('fonts/Syne-Medium.woff2') format('woff2'); font-weight:500; font-display:block; }
@font-face { font-family:'Syne'; src:url('fonts/Syne-SemiBold.woff2') format('woff2'); font-weight:600; font-display:block; }
@font-face { font-family:'Syne'; src:url('fonts/Syne-Bold.woff2') format('woff2'); font-weight:700; font-display:block; }
@font-face { font-family:'Syne'; src:url('fonts/Syne-ExtraBold.woff2') format('woff2'); font-weight:800; font-display:block; }

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--bg2:#0d1220;--bg3:#111827;
  --accent:#3b82f6;--accent2:#60a5fa;--accent3:#93c5fd;
  --text:#e2e8f0;--muted:#7d92b0;
  --border:rgba(59,130,246,0.18);--border2:rgba(59,130,246,0.35);
  --card:rgba(13,18,32,0.85);
}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1rem 2.5rem;background:rgba(8,12,20,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);width:100%;gap:1rem}
nav ul{display:flex;gap:.3rem;list-style:none;align-items:center;flex-shrink:0}
.logo-block{display:flex;align-items:center;gap:14px;flex-shrink:0}
.logo-names{display:flex;flex-direction:column;align-items:center;gap:3px}
.glitch-wrap{position:relative;display:inline-block;font-family:'Orbitron',sans-serif;font-weight:900;letter-spacing:8px;animation:fadeInLogo .8s cubic-bezier(.22,1,.36,1) both}
.glitch-wrap.soto{animation-delay:.15s}
.glitch-wrap>span{background:linear-gradient(135deg,#c8d8f0 0%,#a8bcd8 60%,#7bafd4 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-size:24px;display:block}
.glitch-wrap::before,.glitch-wrap::after{content:attr(data-text);position:absolute;top:0;left:0;font-family:'Orbitron',sans-serif;font-weight:900;font-size:24px;letter-spacing:8px;width:100%;opacity:0}
.glitch-wrap::before{color:#38bdf8;clip-path:polygon(0 15%,100% 15%,100% 48%,0 48%);animation:glitch-a 3s infinite}
.glitch-wrap::after{color:#818cf8;clip-path:polygon(0 55%,100% 55%,100% 82%,0 82%);animation:glitch-b 3s infinite}
.glitch-wrap.soto::before{animation:glitch-a 3s .08s infinite}
.glitch-wrap.soto::after{animation:glitch-b 3s .08s infinite}
@keyframes fadeInLogo{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes glitch-a{0%,78%,100%{opacity:0;transform:none}80%{opacity:.75;transform:translate(-3px,1px)}82%{opacity:.5;transform:translate(3px,-1px)}84%{opacity:.65;transform:translate(-2px,.5px)}86%{opacity:0;transform:none}}
@keyframes glitch-b{0%,78%,100%{opacity:0;transform:none}81%{opacity:.6;transform:translate(3px,1.5px)}83%{opacity:.4;transform:translate(-2px,0)}85%{opacity:.55;transform:translate(1.5px,-1px)}87%{opacity:0;transform:none}}
.role-divider{width:1px;height:56px;background:rgba(59,130,246,.2);flex-shrink:0;animation:fadeInLogo .8s ease .5s both}
.logo-role{display:flex;flex-direction:column;gap:3px;animation:fadeInLogo .8s ease .5s both}
.logo-role span{font-size:11px;font-weight:500;color:rgba(147,197,253,.6);letter-spacing:2.5px;text-transform:uppercase;white-space:nowrap}
.logo-role span:last-child{color:rgba(96,165,250,.38);font-weight:300}

/* ── GRADIENT BUTTON ── */
.gradient-button{position:relative;padding:13px 26px;font-size:14px;font-weight:600;color:white;background:transparent;border:none;cursor:pointer;border-radius:50px;overflow:hidden;transition:transform .2s ease;text-decoration:none;display:inline-block;letter-spacing:.06em;font-family:'Space Grotesk',sans-serif;white-space:nowrap}
.gradient-button:hover{transform:scale(1.03)}
.gradient-button::before{content:"";position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,#1a6fff,#00d4ff,#0ea5e9,#38bdf8,#7dd3fc,#1d4ed8,#1a6fff);z-index:-2;filter:blur(8px);transform:rotate(0deg);transition:transform 1.5s ease-in-out}
.gradient-button:hover::before{transform:rotate(180deg)}
.gradient-button::after{content:"";position:absolute;inset:2px;background:#080c14;border-radius:48px;z-index:-1;filter:blur(2px)}
.gradient-text{color:transparent;background:conic-gradient(from 0deg,#60a5fa,#38bdf8,#7dd3fc,#93c5fd,#bfdbfe,#60a5fa,#38bdf8);background-clip:text;-webkit-background-clip:text}
.gradient-button:hover .gradient-text{animation:hue-rotating 2s linear infinite}
.gradient-button:active{transform:scale(.99)}
@keyframes hue-rotating{to{filter:hue-rotate(360deg)}}

/* ── BACK BUTTON ── */
.back-btn{display:inline-flex;align-items:center;gap:.5rem;color:var(--muted);text-decoration:none;font-size:.85rem;letter-spacing:.06em;transition:color .2s}
.back-btn:hover{color:var(--accent2)}
.back-btn::before{content:'←'}

/* ── PAGE HEADER ── */
.page-header{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:3rem 2.5rem 1.5rem}
.page-header h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:800;color:#f0f6ff;margin-bottom:.5rem}
.page-header p{color:var(--muted);font-size:.95rem}

/* ── SECTION ── */
section{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:1.5rem 2.5rem 4rem}

/* ── FILTER TABS ── */
.filter-tabs{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:2rem}
.filter-tab{font-size:.78rem;padding:.4rem 1rem;border-radius:100px;border:1px solid var(--border);color:var(--muted);background:transparent;cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif;letter-spacing:.05em}
.filter-tab:hover,.filter-tab.active{background:rgba(59,130,246,.12);color:var(--accent2);border-color:var(--border2)}

/* ── PORTFOLIO GRID ── */
.portfolio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.25rem}
.portfolio-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .25s}
.portfolio-card:hover{border-color:var(--border2);transform:translateY(-4px);box-shadow:0 0 24px rgba(59,130,246,.12)}
.card-thumb{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.card-thumb .play-btn{width:48px;height:48px;border-radius:50%;background:rgba(59,130,246,.9);display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:transform .2s;z-index:2}
.portfolio-card:hover .play-btn{transform:scale(1.1)}
.card-thumb-bg{position:absolute;inset:0;opacity:.25}
.card-body{padding:1rem}
.card-tag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:.4rem}
.card-title{font-weight:600;font-size:.95rem;color:var(--text);margin-bottom:.35rem}
.card-desc{font-size:.78rem;color:var(--muted);line-height:1.5}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-top:1px solid var(--border)}
.card-tools{display:flex;gap:.4rem;flex-wrap:wrap}
.tool-badge{font-size:.65rem;padding:.2rem .55rem;border-radius:100px;background:rgba(59,130,246,.1);color:var(--accent3);border:1px solid rgba(59,130,246,.2)}
.card-arrow{color:var(--accent);font-size:1rem}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:90%;max-width:720px;max-height:90vh;overflow-y:auto;padding:2rem;position:relative}
.modal-close{position:absolute;top:1rem;right:1rem;background:var(--bg3);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{color:var(--text);border-color:var(--accent)}
.modal-video{width:100%;aspect-ratio:16/9;border-radius:10px;margin-bottom:1.5rem;background:#000;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);color:var(--muted);font-size:.9rem;flex-direction:column;gap:.5rem}
.modal-video .video-icon{font-size:2.5rem}
.modal-tag{font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:.5rem}
.modal-title{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:#f0f6ff;margin-bottom:.75rem}
.modal-desc{color:var(--muted);font-size:.9rem;line-height:1.7;margin-bottom:1.25rem}
.modal-tags{display:flex;gap:.5rem;flex-wrap:wrap}

footer{position:relative;z-index:1;text-align:center;padding:2rem;border-top:1px solid var(--border);color:var(--muted);font-size:.8rem;letter-spacing:.06em}
footer span{color:var(--accent)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}

/* ── MOBILE ── */
@media(max-width:768px){
  nav{flex-direction:column;align-items:center;padding:.85rem 1.25rem;gap:.75rem}
  .logo-block{width:100%;justify-content:center}
  .logo-names{align-items:center}
  nav ul{width:100%;justify-content:center;gap:.2rem;flex-wrap:wrap}
  .logo-role{display:none}.role-divider{display:none}
  .glitch-wrap>span,.glitch-wrap::before,.glitch-wrap::after{font-size:18px}
  .gradient-button{padding:7px 13px;font-size:10.5px}
  .page-header{padding:2rem 1.25rem 1rem}
  section{padding:1rem 1.25rem 3rem}
  .portfolio-grid{grid-template-columns:1fr}
}
@media(max-width:420px){
  .glitch-wrap>span,.glitch-wrap::before,.glitch-wrap::after{font-size:16px}
  .gradient-button{padding:6px 11px;font-size:10px}
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<!-- NAV -->
<nav>
  <div class="logo-block">
    <div class="logo-names">
      <div class="glitch-wrap" data-text="GARY"><span>GARY</span></div>
      <div class="glitch-wrap soto" data-text="SOTO"><span>SOTO</span></div>
    </div>
    <div class="role-divider"></div>
    <div class="logo-role">
      <span>Content</span>
      <span>Strategist</span>
      <span>Video Editor</span>
    </div>
  </div>
  <ul>
    <li><a href="index.html" class="gradient-button"><span class="gradient-text">← Volver al inicio</span></a></li>
  </ul>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <h1>Portafolio <span style="color:var(--accent2)">completo</span></h1>
  <p>Todos los proyectos — spots, reels, contenido digital y más.</p>
</div>

<!-- PORTAFOLIO -->
<section>
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="filterCards('all',this)">Todo</button>
    <button class="filter-tab" onclick="filterCards('deportes',this)">Deportes</button>
    <button class="filter-tab" onclick="filterCards('reel',this)">Reels / Shorts</button>
    <button class="filter-tab" onclick="filterCards('web',this)">Web & Marketing</button>
    <button class="filter-tab" onclick="filterCards('social',this)">Social Media</button>
  </div>
  <div class="portfolio-grid" id="portfolio-grid"></div>
</section>

<footer>Diseñado y construido por <span>Gary Soto</span> · Lima, Perú · 2025</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-video" id="modal-video">
      <span class="video-icon">▶</span>
      <span id="modal-video-label">Preview del proyecto</span>
    </div>
    <div class="modal-tag" id="modal-tag"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-desc" id="modal-desc"></div>
    <div class="modal-tags" id="modal-tools"></div>
  </div>
</div>

<script>
// ── TODOS LOS PROYECTOS — agrega aquí todos tus trabajos ──
// Categorías disponibles: 'deportes' | 'reel' | 'web' | 'social'
// Para agregar un video de YouTube: videoUrl: 'https://www.youtube.com/embed/TU_ID_AQUI'
const projects = [
  {id:1,  cat:'deportes', color:'#1e3a5f', tag:'Deportes',         title:'Proyecto deportes 1',    desc:'Descripción del proyecto. Reemplaza con tu info real.',     tools:['Premiere Pro','After Effects'], videoUrl:''},
  {id:2,  cat:'deportes', color:'#1a2f4e', tag:'Deportes',         title:'Proyecto deportes 2',    desc:'Descripción del proyecto. Reemplaza con tu info real.',     tools:['DaVinci Resolve','Premiere'],   videoUrl:''},
  {id:3,  cat:'reel',     color:'#1a3a2a', tag:'Reel / Short',     title:'Proyecto reel 1',        desc:'Descripción del proyecto. Reemplaza con tu info real.',     tools:['CapCut Pro','Premiere'],        videoUrl:''},
  {id:4,  cat:'reel',     color:'#1e3828', tag:'Reel / Short',     title:'Proyecto reel 2',        desc:'Descripción del proyecto. Reemplaza con tu info real.',     tools:['Premiere','Canva'],             videoUrl:''},
  {id:5,  cat:'web',      color:'#2a1a3e', tag:'Web & Marketing',  title:'Proyecto web 1',         desc:'Descripción del proyecto. Reemplaza con tu info real.',     tools:['After Effects','Figma'],        videoUrl:''},
  {id:6,  cat:'web',      color:'#1e2d3e', tag:'Web & Marketing',  title:'Proyecto web 2',         desc:'Descripción del proyecto. Reemplaza con tu info real.',     tools:['After Effects','Illustrator'],  videoUrl:''},
  {id:7,  cat:'social',   color:'#3a2a10', tag:'Social Media',     title:'Proyecto social 1',      desc:'Descripción del proyecto. Reemplaza con tu info real.',     tools:['TikTok Studio','Meta Suite'],   videoUrl:''},
  {id:8,  cat:'social',   color:'#2e2210', tag:'Social Media',     title:'Proyecto social 2',      desc:'Descripción del proyecto. Reemplaza con tu info real.',     tools:['Meta Suite','Analytics'],       videoUrl:''},
];

function renderCards(filter='all'){
  const grid=document.getElementById('portfolio-grid');
  const f=filter==='all'?projects:projects.filter(p=>p.cat===filter);
  grid.innerHTML=f.map(p=>`
    <div class="portfolio-card" onclick="openModal(${p.id})">
      <div class="card-thumb" style="background:${p.color}22;"><div class="card-thumb-bg" style="background:${p.color};"></div><div class="play-btn">▶</div></div>
      <div class="card-body"><div class="card-tag">${p.tag}</div><div class="card-title">${p.title}</div><div class="card-desc">${p.desc.substring(0,72)}...</div></div>
      <div class="card-footer"><div class="card-tools">${p.tools.slice(0,2).map(t=>`<span class="tool-badge">${t}</span>`).join('')}</div><span class="card-arrow">→</span></div>
    </div>`).join('');
}
function filterCards(cat,btn){
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');renderCards(cat);
}
function openModal(id){
  const p=projects.find(x=>x.id===id);
  document.getElementById('modal-tag').textContent=p.tag;
  document.getElementById('modal-title').textContent=p.title;
  document.getElementById('modal-desc').textContent=p.desc;
  const videoEl=document.getElementById('modal-video');
  if(p.videoUrl){
    videoEl.innerHTML=`<iframe width="100%" height="100%" src="${p.videoUrl}" frameborder="0" allowfullscreen style="border-radius:10px;"></iframe>`;
    videoEl.style.padding='0';
  }else{
    videoEl.innerHTML=`<span class="video-icon">▶</span><span>Preview: ${p.title}</span>`;
  }
  document.getElementById('modal-tools').innerHTML=p.tools.map(t=>`<span class="tool-badge">${t}</span>`).join('');
  document.getElementById('modal').classList.add('open');
}
function closeModal(e){
  if(!e||e.target.classList.contains('modal-overlay')||e.target.classList.contains('modal-close')){
    const v=document.getElementById('modal-video');
    if(v.querySelector('iframe'))v.innerHTML=`<span class="video-icon">▶</span><span>Preview del proyecto</span>`;
    document.getElementById('modal').classList.remove('open');
  }
}
renderCards();

/* ── 3D BG (ligero) ── */
(function(){
  const canvas=document.getElementById('bg-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,frame=0,rotX=0,rotY=0;
  const nodes=Array.from({length:40},()=>({
    x:Math.random(),y:Math.random(),z:Math.random(),
    vx:(Math.random()-.5)*.0008,vy:(Math.random()-.5)*.0008,vz:(Math.random()-.5)*.002,
    r:Math.random()*1.5+.5,pulse:Math.random()*Math.PI*2,type:Math.random()>.65?'node':'dot'
  }));
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
  function project(x,y,z){
    const fov=600,px=(x-.5)*W,py=(y-.5)*H,pz=z*400-200;
    const cosY=Math.cos(rotY),sinY=Math.sin(rotY);
    const rx=px*cosY-pz*sinY,rz=px*sinY+pz*cosY;
    const cosX=Math.cos(rotX),sinX=Math.sin(rotX);
    const ry2=py*cosX-rz*sinX,rz2=py*sinX+rz*cosX;
    const scale=fov/(fov+rz2+300);
    return{sx:W/2+rx*scale,sy:H/2+ry2*scale,scale,depth:rz2};
  }
  function drawGrid(){
    const steps=10;ctx.lineWidth=.4;
    for(let i=0;i<=steps;i++){
      const t=i/steps;
      const p1=project(0,t,.5),p2=project(1,t,.5);
      ctx.strokeStyle=`rgba(59,130,246,${.025+.015*Math.sin(frame*.01+t*3)})`;
      ctx.beginPath();ctx.moveTo(p1.sx,p1.sy);ctx.lineTo(p2.sx,p2.sy);ctx.stroke();
      const p3=project(t,0,.5),p4=project(t,1,.5);
      ctx.strokeStyle=`rgba(59,130,246,${.025+.015*Math.sin(frame*.01+t*3)})`;
      ctx.beginPath();ctx.moveTo(p3.sx,p3.sy);ctx.lineTo(p4.sx,p4.sy);ctx.stroke();
    }
  }
  function drawOrbs(){
    const t=frame*.003;
    [{x:W*.15+Math.sin(t)*80,y:H*.2+Math.cos(t*.7)*50,r:260,c:'rgba(59,130,246,0.04)'},
     {x:W*.82+Math.cos(t*.8)*90,y:H*.3+Math.sin(t*.5)*60,r:200,c:'rgba(99,102,241,0.03)'},
     {x:W*.5+Math.sin(t*.6)*120,y:H*.8+Math.cos(t*.9)*70,r:300,c:'rgba(59,130,246,0.03)'}
    ].forEach(o=>{
      const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
      g.addColorStop(0,o.c);g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fill();
    });
  }
  function drawNodes(){
    const projected=nodes.map(n=>{const p=project(n.x,n.y,n.z);return{...n,...p}}).sort((a,b)=>a.depth-b.depth);
    for(let i=0;i<projected.length;i++)for(let j=i+1;j<projected.length;j++){
      const a=projected[i],b=projected[j];
      const dx=a.sx-b.sx,dy=a.sy-b.sy,d=Math.sqrt(dx*dx+dy*dy);
      const maxD=160*Math.min(a.scale,b.scale)*2;
      if(d<maxD){
        ctx.strokeStyle=`rgba(59,130,246,${(1-d/maxD)*.18*Math.min(a.scale,b.scale)*2})`;
        ctx.lineWidth=.7*Math.min(a.scale,b.scale)*2;
        ctx.beginPath();ctx.moveTo(a.sx,a.sy);ctx.lineTo(b.sx,b.sy);ctx.stroke();
      }
    }
    projected.forEach(n=>{
      n.pulse+=.025;const g=Math.sin(n.pulse)*.5+.5;const r=n.r*n.scale*2.5;
      if(n.type==='node'){
        ctx.fillStyle=`rgba(96,165,250,${(.3+g*.3)*n.scale*1.2})`;
        ctx.beginPath();ctx.arc(n.sx,n.sy,r*1.4,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle=`rgba(59,130,246,${(.15+g*.15)*n.scale*1.2})`;
        ctx.lineWidth=.8;ctx.beginPath();ctx.arc(n.sx,n.sy,r*2.8,0,Math.PI*2);ctx.stroke();
      }else{
        ctx.fillStyle=`rgba(147,197,253,${(.15+g*.2)*n.scale*1.2})`;
        ctx.beginPath();ctx.arc(n.sx,n.sy,r,0,Math.PI*2);ctx.fill();
      }
    });
    nodes.forEach(n=>{
      n.x+=n.vx;n.y+=n.vy;n.z+=n.vz;
      if(n.x<0||n.x>1)n.vx*=-1;if(n.y<0||n.y>1)n.vy*=-1;if(n.z<0||n.z>1)n.vz*=-1;
    });
  }
  function animate(){
    ctx.clearRect(0,0,W,H);
    rotY=Math.sin(frame*.0008)*.18;rotX=Math.sin(frame*.0005)*.08;
    drawOrbs();drawGrid();drawNodes();frame++;requestAnimationFrame(animate);
  }
  resize();animate();window.addEventListener('resize',resize);
})();
</script>
</body>
